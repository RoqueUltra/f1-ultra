<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Ultra - Resultados</title>
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --f1-red: #e10600;
            --dark-bg: #0f0f1a;
            --card-bg: #1a1a2e;
            --header-bg: #161625;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --border-color: #2a2a3e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Titillium Web', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            font-size: 14px;
        }
        .top-header {
            background: linear-gradient(135deg, var(--f1-red) 0%, #9e0000 100%);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { font-size: 2.2rem; font-weight: 900; font-style: italic; }
        .session-selector { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .session-selector label { font-weight: 700; font-size: 0.9rem; }
        .session-selector select {
            padding: 10px 15px;
            background: var(--dark-bg);
            color: white;
            border: 2px solid white;
            border-radius: 4px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
        }
        #year-select { max-width: 100px; border-color: var(--f1-red) !important; }
        #gp-select { max-width: 400px; }
        .live-indicator {
            display: flex; align-items: center; gap: 8px;
            background: white; color: var(--f1-red);
            padding: 8px 16px; border-radius: 4px;
            font-weight: 700; font-size: 0.85rem;
        }
        .session-info-bar {
            background: var(--card-bg); padding: 15px 30px;
            display: flex; justify-content: space-between;
            border-bottom: 2px solid var(--f1-red);
        }
        .circuit-name { font-size: 1.3rem; font-weight: 700; }
        .session-type {
            background: var(--f1-red); padding: 6px 20px;
            border-radius: 4px; font-weight: 700;
            text-transform: uppercase; font-size: 0.9rem;
        }
        .main-layout { display: grid; grid-template-columns: 1fr 400px; gap: 0; min-height: calc(100vh - 180px); }
        @media (max-width: 1200px) { .main-layout { grid-template-columns: 1fr; } }
        .timing-container { background: var(--card-bg); overflow-x: auto; }
        .timing-table { width: 100%; border-collapse: collapse; }
        .timing-table thead {
            background: var(--header-bg); position: sticky; top: 0; z-index: 10;
        }
        .timing-table th {
            padding: 15px 10px; text-align: left; font-weight: 600;
            text-transform: uppercase; color: var(--text-secondary);
            border-bottom: 2px solid var(--f1-red); font-size: 0.8rem;
        }
        .timing-table td { padding: 12px 10px; border-bottom: 1px solid var(--border-color); }
        .timing-table tr:hover { background: rgba(225, 6, 0, 0.15); }
        .pos-col { font-weight: 700; font-size: 1.1rem; width: 50px; color: var(--f1-red); text-align: center; }
        .driver-info { display: flex; align-items: center; gap: 12px; min-width: 220px; }
        .team-line { width: 4px; height: 35px; border-radius: 2px; }
        .driver-number { font-size: 0.75rem; color: var(--text-secondary); font-weight: 600; }
        .driver-name { font-weight: 700; font-size: 0.95rem; }
        .team-name { font-size: 0.8rem; color: var(--text-secondary); }
        .laps-col { text-align: center; font-weight: 600; width: 70px; }
        .gap-positive { color: #4cd964; font-family: monospace; font-weight: 700; }
        .gap-leader { color: var(--text-secondary); font-family: monospace; }
        .best-lap { font-family: monospace; font-weight: 700; }
        .tire-compound {
            display: inline-block; padding: 4px 10px; border-radius: 4px;
            font-size: 0.8rem; font-weight: 700; min-width: 45px; text-align: center;
        }
        .tire-soft { background: #da291c; color: white; }
        .tire-medium { background: #ffd700; color: black; }
        .tire-hard { background: #ffffff; color: black; }
        .sidebar { background: var(--header-bg); border-left: 2px solid var(--border-color); }
        .sidebar-section { border-bottom: 2px solid var(--border-color); }
        .sidebar-header {
            background: var(--card-bg); padding: 12px 20px; font-weight: 700;
            text-transform: uppercase; border-bottom: 2px solid var(--f1-red);
        }
        .sidebar-content { padding: 15px; max-height: 350px; overflow-y: auto; }
        .rc-item {
            padding: 10px; margin-bottom: 8px; background: rgba(255,255,255,0.03);
            border-left: 3px solid var(--f1-red); border-radius: 0 4px 4px 0;
            font-size: 0.85rem;
        }
        .rc-lap { font-weight: 700; color: var(--f1-red); margin-right: 8px; }
        .chat-messages {
            flex: 1; overflow-y: auto; padding: 15px;
            background: rgba(0,0,0,0.2); min-height: 300px; max-height: 400px;
        }
        .chat-item {
            margin-bottom: 12px; padding: 10px;
            background: rgba(255,255,255,0.05); border-radius: 6px;
        }
        .chat-username { font-weight: 700; color: var(--f1-red); font-size: 0.85rem; }
        .chat-input-area {
            padding: 15px; background: var(--card-bg); display: flex; gap: 10px;
        }
        .chat-input {
            flex: 1; padding: 10px; border: 1px solid var(--border-color);
            background: var(--dark-bg); color: white; border-radius: 4px;
        }
        .chat-send {
            padding: 10px 20px; background: var(--f1-red); color: white;
            border: none; border-radius: 4px; font-weight: 700; cursor: pointer;
        }
        .loading-state { text-align: center; padding: 40px; color: var(--text-secondary); }
        .spinner {
            border: 3px solid var(--border-color); border-top: 3px solid var(--f1-red);
            border-radius: 50%; width: 40px; height: 40px;
            animation: spin 1s linear infinite; margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--dark-bg); }
        ::-webkit-scrollbar-thumb { background: var(--f1-red); border-radius: 4px; }
    </style>
</head>
<body>
    <div class="top-header">
        <div class="logo">F1 ULTRA</div>
        <div class="session-selector">
            <label for="year-select">📅 Año:</label>
            <select id="year-select" onchange="changeYear()">
                <option value="2024">2024</option>
                <option value="2023">2023</option>
                <option value="2022">2022</option>
                <option value="2021">2021</option>
                <option value="2020">2020</option>
            </select>
            <label for="gp-select" style="margin-left: 15px;">🏁 Gran Premio:</label>
            <select id="gp-select" onchange="loadSelectedRace()">
                <option value="">⏳ Cargando...</option>
            </select>
        </div>
        <div class="live-indicator">📦 HISTÓRICO</div>
    </div>
    <div class="session-info-bar">
        <div>
            <div class="circuit-name" id="circuit-name">Selecciona un GP</div>
            <div id="race-date" style="color: var(--text-secondary); font-size: 0.9rem;">--</div>
        </div>
        <div class="session-type" id="session-type">Carrera</div>
    </div>
    <div class="main-layout">
        <div class="timing-container">
            <table class="timing-table">
                <thead>
                    <tr>
                        <th>Pos</th><th>Piloto</th><th>Equipo</th><th>Vueltas</th>
                        <th>Tiempo/Gap</th><th>Puntos</th><th>V. Rápida</th>
                    </tr>
                </thead>
                <tbody id="timing-body">
                    <tr><td colspan="7" class="loading-state"><div class="spinner"></div>Cargando datos de Ergast API...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-header">🏁 Race Control</div>
                <div class="sidebar-content" id="race-control">
                    <div class="rc-item"><span class="rc-lap">INFO</span>Datos históricos de Ergast API</div>
                </div>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-header">💬 Chat</div>
                <div class="chat-messages" id="chat-messages">
                    <div class="chat-item"><div class="chat-username">Admin</div><div>Chat disponible con Firebase</div></div>
                </div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chat-username" placeholder="Nombre" maxlength="15">
                    <input type="text" class="chat-input" id="chat-text" placeholder="Mensaje..." maxlength="200">
                    <button class="chat-send" onclick="sendChat()">Enviar</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        // Firebase (opcional para chat)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, query, limitToLast } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "TU_API_KEY",
            authDomain: "TU_PROYECTO.firebaseapp.com",
            databaseURL: "https://TU_PROYECTO-default-rtdb.firebaseio.com",
            projectId: "TU_PROYECTO",
            storageBucket: "TU_PROYECTO.appspot.com",
            messagingSenderId: "123456789",
            appId: "1:123456789:web:abc123"
        };
        
        let db;
        try {
            const app = initializeApp(firebaseConfig);
            db = getDatabase(app);
            setupChat();
        } catch(e) { console.log("Firebase no configurado"); }
        
        function setupChat() {
            const q = query(ref(db, 'messages'), limitToLast(50));
            onChildAdded(q, (s) => {
                const d = s.val();
                addChat(d.user, d.text, d.time);
            });
        }
        window.sendChat = async function() {
            if(!db) return alert("Configura Firebase");
            const u = document.getElementById('chat-username').value||'Anónimo';
            const t = document.getElementById('chat-text').value.trim();
            if(!t) return;
            await push(ref(db,'messages'), {user:u, text:t, time:new Date().toLocaleTimeString()});
            document.getElementById('chat-text').value='';
        }
        function addChat(u,t,time) {
            const c = document.getElementById('chat-messages');
            if(c.children[0]?.classList.contains('loading-state')) c.innerHTML='';
            c.innerHTML += `<div class="chat-item"><div class="chat-username">${u}</div><div>${t}</div></div>`;
            c.scrollTop = c.scrollHeight;
        }
    </script>

    <script>
        const ERGAST_API = "https://ergast.com/api/f1";
        let currentRaceUrl = null;
        const TEAM_COLORS = {
            'Red Bull': '#061D42', 'Ferrari': '#DC0000', 'Mercedes': '#00D2BE',
            'McLaren': '#FF8700', 'Aston Martin': '#006F62', 'Alpine': '#0090FF',
            'Williams': '#005AFF', 'RB': '#1634CB', 'Sauber': '#52E252', 'Haas': '#B6BABD'
        };

        let currentYear = 2024;

        window.changeYear = function() {
            currentYear = document.getElementById('year-select').value;
            loadRaces();
        }

        async function loadRaces() {
            const select = document.getElementById('gp-select');
            select.innerHTML = '<option value="">⏳ Cargando...</option>';
            try {
                const res = await fetch(`${ERGAST_API}/${currentYear}.json?limit=40`);
                const data = await res.json();
                const races = data.MRData.RaceTable.Races;
                select.innerHTML = '<option value="">🏁 Selecciona un Gran Premio</option>';
                races.forEach(race => {
                    const opt = document.createElement('option');
                    opt.value = race.url;
                    opt.textContent = `${getFlag(race.Circuit?.Location?.country)} ${race.raceName} - ${race.date}`;
                    opt.dataset.circuit = race.Circuit?.circuitName || '';
                    opt.dataset.date = race.date;
                    opt.dataset.racename = race.raceName;
                    select.appendChild(opt);
                });
                if(races.length > 0) {
                    select.value = races[races.length-1].url;
                    loadSelectedRace();
                }
            } catch(e) {
                select.innerHTML = '<option value="">❌ Error cargando carreras</option>';
                console.error(e);
            }
        }

        window.loadSelectedRace = async function() {
            const select = document.getElementById('gp-select');
            const opt = select.options[select.selectedIndex];
            if(!select.value) return;
            currentRaceUrl = select.value;
            document.getElementById('circuit-name').textContent = opt.dataset.circuit;
            document.getElementById('race-date').textContent = opt.dataset.date;
            document.getElementById('session-type').textContent = 'Carrera';
            await loadRaceResults();
        }

        async function loadRaceResults() {
            const tbody = document.getElementById('timing-body');
            tbody.innerHTML = '<tr><td colspan="7" class="loading-state"><div class="spinner"></div>Cargando resultados...</td></tr>';
            try {
                const res = await fetch(`${currentRaceUrl}/results.json?limit=40`);
                const data = await res.json();
                const results = data.MRData.RaceTable.Races[0]?.Results || [];
                if(results.length === 0) throw new Error('Sin resultados');
                renderTable(results);
            } catch(e) {
                tbody.innerHTML = `<tr><td colspan="7" class="loading-state">❌ Error: ${e.message}</td></tr>`;
            }
        }

        function renderTable(results) {
            const tbody = document.getElementById('timing-body');
            tbody.innerHTML = '';
            results.forEach(r => {
                let color = '#555';
                for(const [t,c] of Object.entries(TEAM_COLORS)) {
                    if(r.Constructor?.name?.includes(t)) { color = c; break; }
                }
                const time = r.Time?.time || (r.status !== 'Finished' ? r.status : '+1 Vuelta');
                const gap = r.Time?.gap ? `+${r.Time.gap}` : (r.position==='1' ? 'Liderando' : '');
                const fastLap = r.FastestLap?.Time?.time || '--:--.---';
                const row = `
                    <tr>
                        <td class="pos-col">${r.position}</td>
                        <td>
                            <div class="driver-info">
                                <div class="team-line" style="background:${color}"></div>
                                <div>
                                    <div class="driver-number">#${r.Driver?.permanentNumber||'--'}</div>
                                    <div class="driver-name">${r.Driver?.givenName} ${r.Driver?.familyName}</div>
                                    <div class="team-name">${r.Constructor?.name}</div>
                                </div>
                            </div>
                        </td>
                        <td>${r.Constructor?.name}</td>
                        <td class="laps-col">${r.laps}</td>
                        <td><span class="${gap==='Liderando'?'gap-leader':'gap-positive'}">${gap || time}</span></td>
                        <td style="text-align:center;font-weight:700">${r.points}</td>
                        <td class="best-lap">${fastLap}</td>
                    </tr>`;
                tbody.innerHTML += row;
            });
        }

        function getFlag(country) {
            const f = {'Australia':'🇦🇺','Bahrain':'🇧','Saudi Arabia':'🇸🇦','Japan':'🇯🇵','China':'🇨','USA':'🇺','Monaco':'🇲','Spain':'🇪','Canada':'🇨','Great Britain':'🇬🇧','Italy':'🇮🇹','Belgium':'🇧🇪','Netherlands':'🇳','Singapore':'🇬','Mexico':'🇲🇽','Brazil':'🇧🇷','Abu Dhabi':'🇦🇪'};
            return f[country] || '🏁';
        }

        // Init
        loadRaces();
    </script>
</body>
</html>
